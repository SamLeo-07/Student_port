<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migrate Student Data</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 2rem;
            background: #f5f5f5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 1rem;
        }

        .status {
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            font-weight: 600;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        button {
            background: #9b59b6;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin: 0.5rem 0;
        }

        button:hover {
            background: #8e44ad;
        }

        pre {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔄 Migrate Student Data</h1>
        <p>This page will update existing student records to include the new fields (ID, assignedCourses, status).</p>

        <button onclick="migrateData()">Migrate Student Data</button>

        <div id="output"></div>
    </div>

    <script>
        function migrateData() {
            const output = document.getElementById('output');
            let html = '<h2>Migration Results:</h2>';

            // Migrate users
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            let migratedCount = 0;

            users.forEach(user => {
                let needsMigration = false;

                if (!user.id) {
                    user.id = 'STU' + Date.now() + Math.random().toString(36).substr(2, 5).toUpperCase();
                    needsMigration = true;
                }

                if (!user.assignedCourses) {
                    user.assignedCourses = [];
                    needsMigration = true;
                }

                if (!user.status) {
                    user.status = 'active';
                    needsMigration = true;
                }

                if (!user.updatedAt) {
                    user.updatedAt = user.createdAt || new Date().toISOString();
                    needsMigration = true;
                }

                if (needsMigration) {
                    migratedCount++;
                }
            });

            localStorage.setItem('users', JSON.stringify(users));

            // Sync to portalData
            const portalData = JSON.parse(localStorage.getItem('portalData') || '{}');
            if (!portalData.students) portalData.students = [];

            // Clear and rebuild students array
            portalData.students = users.map(user => ({
                id: user.id,
                name: user.name,
                email: user.email,
                batch: user.batch,
                assignedCourses: user.assignedCourses || [],
                status: user.status || 'active',
                createdAt: user.createdAt,
                updatedAt: user.updatedAt
            }));

            // Update statistics
            if (!portalData.statistics) portalData.statistics = {};
            portalData.statistics.totalStudents = portalData.students.length;

            localStorage.setItem('portalData', JSON.stringify(portalData));

            html += `<div class="status success">✅ Migration completed successfully!</div>`;
            html += `<ul>`;
            html += `<li><strong>Total students:</strong> ${users.length}</li>`;
            html += `<li><strong>Students migrated:</strong> ${migratedCount}</li>`;
            html += `<li><strong>Students synced to portalData:</strong> ${portalData.students.length}</li>`;
            html += `</ul>`;

            html += `<h3>Sample Student Data:</h3>`;
            if (users.length > 0) {
                html += '<pre>' + JSON.stringify(users[0], null, 2) + '</pre>';
            }

            html += `<div class="status warning">⚠️ Please refresh the admin dashboard to see the updated student list!</div>`;

            output.innerHTML = html;
        }
    </script>
</body>

</html>
