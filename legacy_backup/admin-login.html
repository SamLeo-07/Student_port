<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Cynex AI</title>
    <link rel="stylesheet" href="admin-auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="auth-container">
        <!-- Left Side - Branding -->
        <div class="auth-branding">
            <div class="branding-content">
                <div class="logo-section">
                    <div class="logo-text">
                        <span class="logo-cynex">CYNEX</span>
                        <span class="logo-ai">AI</span>
                    </div>
                    <div class="logo-tagline">ADMIN PORTAL</div>
                </div>
                <h1 class="branding-title">Administrator Access</h1>
                <p class="branding-subtitle">Manage your student portal, courses, and content from one powerful
                    dashboard.</p>
                <div class="branding-features">
                    <div class="feature-item">
                        <i class="fas fa-users-cog"></i>
                        <span>Manage Students</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-video"></i>
                        <span>Add Courses & Videos</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-certificate"></i>
                        <span>Issue Certificates</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-bullhorn"></i>
                        <span>Post Announcements</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="auth-forms">
            <div class="forms-container">
                <div class="admin-badge">
                    <i class="fas fa-shield-alt"></i>
                    <span>Administrator</span>
                </div>

                <!-- Login Form -->
                <div class="form-wrapper active">
                    <h2 class="form-title">Admin Login</h2>
                    <p class="form-subtitle">Enter your administrator credentials</p>

                    <form id="adminLoginForm" class="auth-form">
                        <div class="form-group">
                            <label for="admin-email">Admin Email</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user-shield"></i>
                                <input type="email" id="admin-email" name="email" placeholder="Enter admin email"
                                    required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="admin-password">Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="admin-password" name="password" placeholder="Enter password"
                                    required>
                                <i class="fas fa-eye toggle-password" data-target="admin-password"></i>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-label">
                                <input type="checkbox" id="remember-admin" name="remember">
                                <span>Keep me logged in</span>
                            </label>
                        </div>

                        <div class="error-message" id="login-error"></div>

                        <button type="submit" class="submit-btn">
                            <span>Access Admin Portal</span>
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </form>

                    <div class="form-footer">
                        <p><a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Student
                                Portal</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="admin-auth.js"></script>
</body>

</html>
