[build]
  command = "npm run build"
  publish = "frontend/dist"
  functions = "backend"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@libsql/client", "bcryptjs"]

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
