[build]
  command = "npm run build"
  publish = "frontend/dist"

[functions]
  directory = "backend"
  node_bundler = "esbuild"

[functions.index]
  node_bundler = "esbuild"
  format = "esm"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/index/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
