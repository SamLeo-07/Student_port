[build]
  command = "npm run build"
  publish = "frontend/dist"

[functions]
  directory = "backend"
  node_bundler = "esbuild"
  external_node_modules = ["@libsql/client", "bcryptjs"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
